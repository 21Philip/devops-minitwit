services:
  minitwit_db:
    image: postgres:17
    container_name: minitwit_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /mnt/${VOLUME_NAME}/minitwit_db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db_internal

  migrate:
    image: cecilieelkjaer/minitwit-migrate
    build:
      context: .
      dockerfile: src/Chirp.Infrastructure/Dockerfile
    container_name: migrate
    environment:
      - ConnectionStrings__DefaultConnection=Host=minitwit_db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Port=5433
    depends_on:
      minitwit_db:
        condition: service_healthy
    networks:
      - db_internal

  grafana_db:
    image: postgres:17
    container_name: grafana_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /mnt/${VOLUME_NAME}/grafana_db:/var/lib/postgresql/data
    ports:
      - "5434:5432"

networks:
  db_internal:
    driver: bridge
    name: db_internal
